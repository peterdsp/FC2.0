<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="32%" cy="24%" r="90%">
      <stop offset="0%" stop-color="#1b1322"/>
      <stop offset="55%" stop-color="#0d0a14"/>
      <stop offset="100%" stop-color="#070509"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mono" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3b3b"/>
      <stop offset="50%" stop-color="#ff5247"/>
      <stop offset="100%" stop-color="#19c37d"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- maskable safe zone: keep content within central ~80% -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- ambient blooms -->
  <circle cx="150" cy="150" r="120" fill="#ff3b3b" opacity="0.20" filter="url(#soft)"/>
  <circle cx="380" cy="380" r="120" fill="#19c37d" opacity="0.16" filter="url(#soft)"/>

  <!-- glass panel -->
  <rect x="96" y="96" width="320" height="320" rx="80" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>

  <!-- FC monogram -->
  <g font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-weight="800" text-anchor="middle">
    <text x="256" y="312" font-size="184" fill="url(#mono)" letter-spacing="-8">FC</text>
  </g>

  <!-- specular highlight -->
  <rect x="96" y="96" width="320" height="150" rx="80" fill="#ffffff" opacity="0.06"/>
</svg>
