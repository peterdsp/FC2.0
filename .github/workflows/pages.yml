name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # SF Pro Display is not stored in the repo (it is Apple's font). Fetch +
      # subset it at build time for non-Apple browsers. Non-fatal: Apple devices
      # use the native system font via -apple-system regardless.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build fonts (best effort)
        run: |
          pip install fonttools brotli
          bash web/assets/fonts/fetch-fonts.sh || echo "font build skipped"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deploy
        uses: actions/deploy-pages@v4
