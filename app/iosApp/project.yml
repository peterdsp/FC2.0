# XcodeGen spec for the SwiftUI host. Generate the project with:
#   cd app/iosApp && xcodegen generate
# then open iosApp.xcodeproj. The "Compile Kotlin Framework" phase builds the
# shared ComposeApp.framework via Gradle before linking.
name: iosApp
options:
  bundleIdPrefix: dev.peterdsp
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_VERSION: "5.0"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.peterdsp.fc2
        PRODUCT_NAME: FightClub2
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: iosApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        OTHER_LDFLAGS:
          - $(inherited)
          - -framework
          - ComposeApp
    preBuildScripts:
      - name: Compile Kotlin Framework
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/.."
          ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode
